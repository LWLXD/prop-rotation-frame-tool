services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: prop_tool
      POSTGRES_USER: prop_tool
      POSTGRES_PASSWORD: prop_tool
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rembg-service:
    build: ./apps/rembg-service
    ports:
      - "8001:8001"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      REMBG_SERVICE_URL: http://rembg-service:8001
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data
    ports:
      - "4000:4000"
    depends_on:
      - redis
      - rembg-service

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      REMBG_SERVICE_URL: http://rembg-service:8001
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data
    depends_on:
      - redis
      - rembg-service
